name: Arch Linux

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: archlinux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Arch Linux, GCC, CMake+Ninja)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    container:
      image: archlinux:latest

    env:
      CMAKE_BUILD_TYPE: Release
      KEYFRAME_BUILD_DIR: build
      KEYFRAME_MIN_CMAKE_VERSION: '4.4'
      KEYFRAME_CUDA_MAJOR_VERSION: '13'
      CUDAToolkit_ROOT: /opt/cuda

    steps:
      - name: Prepare Arch keyring + update system
        shell: bash
        run: |
          set -euxo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pacman -S --noconfirm --needed \
            base-devel git \
            cmake ninja \
            gcc \
            ca-certificates \
            cuda
          pacman -Scc --noconfirm || true

          echo "/opt/cuda/bin" >> "${GITHUB_PATH}"
          echo "CUDAToolkit_ROOT=/opt/cuda" >> "${GITHUB_ENV}"

      - name: Toolchain sanity
        shell: bash
        run: |
          set -euxo pipefail
          g++ --version
          cmake --version
          ninja --version
          command -v nvcc
          nvcc --version

          cmake_version="$(cmake --version | sed -n '1s/^cmake version //p')"
          cmake_major="${cmake_version%%.*}"
          cmake_rest="${cmake_version#*.}"
          cmake_minor="${cmake_rest%%.*}"
          if (( cmake_major < 4 || (cmake_major == 4 && cmake_minor < 4) )); then
            echo "::error::CMake ${KEYFRAME_MIN_CMAKE_VERSION} or newer is required; found ${cmake_version}."
            exit 1
          fi

          nvcc --version | grep -Eq "release ${KEYFRAME_CUDA_MAJOR_VERSION}\\."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S . -B "${KEYFRAME_BUILD_DIR}" -G Ninja \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DKEYFRAME_BUILD_APP=ON \
            -DKEYFRAME_BUILD_PROJECT_PLUGIN=ON \
            -DCUDAToolkit_ROOT="${CUDAToolkit_ROOT}"

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build "${KEYFRAME_BUILD_DIR}" --parallel 30
