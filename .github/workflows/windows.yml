name: Windows

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Windows, MSVC, CMake+Ninja)
    runs-on: windows-2022
    timeout-minutes: 180

    env:
      CMAKE_BUILD_TYPE: Release
      KEYFRAME_BUILD_DIR: build
      KEYFRAME_CMAKE_VERSION: '4.4.0'
      KEYFRAME_CUDA_VERSION: '13.2.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CMake
        uses: ssrobins/install-cmake@v1
        with:
          version: ${{ env.KEYFRAME_CMAKE_VERSION }}

      - name: Install Ninja
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install ninja -y --no-progress

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.KEYFRAME_CUDA_VERSION }}

      - name: Toolchain sanity
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cl.exe
          cmake --version
          ninja --version
          if (-not $env:CUDA_PATH) { throw "CUDA_PATH is not set" }
          Get-Command nvcc | Select-Object -ExpandProperty Source
          nvcc --version

          $cmakeVersionLine = (cmake --version | Select-Object -First 1)
          if ($cmakeVersionLine -notmatch "version ([0-9]+)\.([0-9]+)") {
            throw "Unable to parse CMake version from: $cmakeVersionLine"
          }
          $cmakeMajor = [int]$Matches[1]
          $cmakeMinor = [int]$Matches[2]
          if ($cmakeMajor -lt 4 -or ($cmakeMajor -eq 4 -and $cmakeMinor -lt 4)) {
            throw "CMake 4.4 or newer is required; found $cmakeVersionLine."
          }

          $nvccVersion = (nvcc --version) -join "`n"
          if ($nvccVersion -notmatch "release 13\.2") {
            throw "CUDA 13.2 is required; nvcc reported: $nvccVersion"
          }

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake -S . -B "$env:KEYFRAME_BUILD_DIR" -G Ninja `
            "-DCMAKE_BUILD_TYPE=$($env:CMAKE_BUILD_TYPE)" `
            -DKEYFRAME_BUILD_APP=ON `
            -DKEYFRAME_BUILD_PROJECT_PLUGIN=ON `
            "-DCUDAToolkit_ROOT=$($env:CUDA_PATH)"

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --build $env:KEYFRAME_BUILD_DIR --parallel 30
